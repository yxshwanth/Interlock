# Sensor-only config sample (no MCP servers).
# Used by the Kubernetes DaemonSet; also valid for local --mode=sensor.
enforcement: block
egress_allowlist:
  - 10.96.0.1
  - 10.96.0.10
sensitive_paths:
  - /etc/shadow
  - /var/run/secrets
  - /secrets
taint_bridge:
  enabled: false
  # socket_path: /var/run/interlock/taint.sock
evidence:
  backend: jsonl
  path: evidence-sensor.jsonl
  backpressure: drop
  queue_size: 256
logging:
  backpressure: drop
  queue_size: 256
observability:
  listen: "0.0.0.0:9090"
