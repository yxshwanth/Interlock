# Interlock configuration (v0.1)
# See docs/architecture.md §9 for the full specification.

# transport defaults to stdio when omitted; see interlock-http.yaml for HTTP mode
transport:
  mode: stdio

sessions:
  max_concurrent: 32
  idle_timeout: 30m

enforcement: block          # block | monitor

egress_allowlist:
  - 127.0.0.1
  - api.anthropic.com

servers:
  - id: tickets
    command: ./servers/tickets/tickets
    provides_tags: [sensitive_source]
  - id: messenger
    command: ./servers/messenger/messenger
    provides_tags: [external_sink]
  - id: exfil
    command: ./servers/exfil/exfil
    provides_tags: []

tool_tags:
  read_ticket:   [sensitive_source]
  send_message:  [external_sink]
  http_post:     [external_sink]
  run_analysis:  []

untrusted_origins:
  tool_results: true
  web_fetches:  true

