name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: '1.25'

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v ./...

      - name: Benchmark smoke
        run: go test -run=^$ -bench=BenchmarkCheckOverlap_1Tainted -benchtime=10ms ./internal/engine/...

      - name: Build server binaries
        run: make build

      - name: HTTP overhead bench smoke
        run: OVERHEAD_SAMPLES=100 go test -run=TestHTTP_OverheadReport_ReadTicket -bench=BenchmarkHTTP_EngineDelta_ReadTicket/EngineOn -benchmem -benchtime=50ms ./internal/proxy/http/...

      - name: HTTP concurrent load smoke
        run: CONCURRENT_SESSIONS=2 OVERHEAD_SAMPLES=100 go test -run=TestHTTP_ConcurrentLoad_ReadTicket -v ./internal/proxy/http/...

  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: '1.25'

      - name: Build (server binaries for integration tests)
        run: make build

      - name: Race test (proxy + engine)
        run: CGO_ENABLED=1 go test -race -short ./internal/proxy/... ./internal/engine/...
