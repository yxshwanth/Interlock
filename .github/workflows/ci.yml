name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v ./...

      - name: Benchmark smoke
        run: go test -run=^$ -bench=BenchmarkCheckOverlap_1Tainted -benchtime=10ms ./internal/engine/...

  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Build (server binaries for integration tests)
        run: make build

      - name: Race test (proxy + engine)
        run: CGO_ENABLED=1 go test -race -short ./internal/proxy/... ./internal/engine/...
