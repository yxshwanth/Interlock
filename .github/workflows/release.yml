name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v7
        with:
          go-version: "1.25"

      - name: Build release artifacts
        run: |
          chmod +x scripts/release-build.sh
          VERSION="${GITHUB_REF_NAME}" make release

      - name: Smoke --version
        run: ./dist/interlock_linux_amd64 --version

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/interlock_linux_amd64
            dist/k8s-exfil-demo_linux_amd64
            dist/SHA256SUMS
            dist/SHA256SUMS.bpf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
