apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: interlock-sensor
  namespace: interlock-system
  labels:
    app.kubernetes.io/name: interlock
    app.kubernetes.io/component: sensor
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: interlock
      app.kubernetes.io/component: sensor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: interlock
        app.kubernetes.io/component: sensor
    spec:
      serviceAccountName: interlock-sensor
      hostPID: true
      # Capabilities-first production posture. Prefer this over privileged: true
      # on managed clusters (GKE/EKS). Caps load + observe; EXFIL via taint_bridge
      # (proxy → Unix socket) without privileged /proc root reads. See PRIVILEGE.md.
      containers:
        - name: sensor
          image: interlock:dev
          imagePullPolicy: IfNotPresent
          args:
            - --mode=sensor
            - --ebpf
            - --config=/etc/interlock/interlock.yaml
            - --log=/var/log/interlock/events.jsonl
            - --evidence=/var/log/interlock/evidence.jsonl
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 2
            periodSeconds: 5
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["BPF", "PERFMON", "SYS_ADMIN", "KILL"]
          volumeMounts:
            - name: config
              mountPath: /etc/interlock
              readOnly: true
            - name: btf
              mountPath: /sys/kernel/btf
              readOnly: true
            - name: logs
              mountPath: /var/log/interlock
            - name: sys-fs-bpf
              mountPath: /sys/fs/bpf
            - name: tracefs
              mountPath: /sys/kernel/tracing
              readOnly: true
            - name: cgroup
              mountPath: /sys/fs/cgroup
              readOnly: true
            - name: taint-bridge
              mountPath: /var/run/interlock
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: interlock-sensor-config
        - name: btf
          hostPath:
            path: /sys/kernel/btf
            type: Directory
        - name: logs
          emptyDir: {}
        - name: sys-fs-bpf
          hostPath:
            path: /sys/fs/bpf
            type: DirectoryOrCreate
        - name: tracefs
          hostPath:
            path: /sys/kernel/tracing
            type: DirectoryOrCreate
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
            type: Directory
        - name: taint-bridge
          hostPath:
            path: /var/run/interlock
            type: DirectoryOrCreate
      tolerations:
        - operator: Exists
